name: Deploy

# Push to main → auto-deploy to `dev`. Dev is the only environment that
# actually exists today; there is no real `prod` separation. When prod
# becomes a thing, *don't* auto-deploy it from `main` — gate prod behind a
# dedicated `release/*` branch, a git tag, or workflow_dispatch only.
#
# Manual workflow_dispatch is still available for ad-hoc runs (e.g. forcing
# a re-deploy after a manual AWS state change) and for one-off prod deploys
# once that stage exists.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stage:
        description: 'SST stage to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

concurrency:
  # Push events have no `inputs.stage`, so fall back to 'dev'. Manual runs
  # use their selection. Two different stages can deploy concurrently.
  group: deploy-${{ github.event.inputs.stage || 'dev' }}
  cancel-in-progress: false

# OIDC requires `id-token: write`. We keep contents read-only to limit blast
# radius if a step is somehow tricked into using the default GITHUB_TOKEN.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: sst deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.stage || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from `packageManager` in package.json — keep this
      # as the single source of truth to avoid ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # pnpm 11 uses `node:sqlite` (added in Node 22.5) — Node 20 crashes
          # at startup with ERR_UNKNOWN_BUILTIN_MODULE.
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Set this repo variable to the role ARN that
          # scripts/bootstrap-oidc.sh prints on completion.
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: us-west-2

      - name: SST deploy
        run: pnpm --filter infra exec sst deploy --stage ${{ github.event.inputs.stage || 'dev' }}
